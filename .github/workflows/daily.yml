name: 뉴스 대시보드 매일 갱신

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install requests beautifulsoup4 openpyxl
        
      - name: 대시보드 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}
          LOGIN_ACCOUNTS: ${{ secrets.LOGIN_ACCOUNTS }}
        run: python generate_dashboard.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add docs/index.html data/
          [ -f data/geocache.json ] && git add data/geocache.json || true
          git diff --cached --quiet || git commit -m "자동 갱신: $(date +'%Y-%m-%d')"
          git push
